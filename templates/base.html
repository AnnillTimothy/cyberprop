<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CyberProp{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --cyan: #00e5ff;
      --cyan-dim: #007c91;
      --dark-bg: #0a0e17;
      --card-bg: #111827;
    }
    body {
      background-color: var(--dark-bg);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    .navbar { border-bottom: 1px solid var(--cyan-dim); }
    .text-info, a.text-info { color: var(--cyan) !important; }
    .btn-outline-info {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .btn-outline-info:hover {
      background-color: var(--cyan);
      color: var(--dark-bg);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }
    .border-info { border-color: var(--cyan) !important; }
    .card { background-color: var(--card-bg); }
    .form-control, .form-select {
      background-color: #1a2332;
      border-color: var(--cyan-dim);
      color: #e0e0e0;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
      background-color: #1a2332;
      color: #e0e0e0;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-info fw-bold" href="/">
        <i class="bi bi-building"></i> CyberProp
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'accounts:profile' %}">
                <i class="bi bi-person-circle"></i> {{ user.username }}
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'accounts:logout' %}">
                <i class="bi bi-box-arrow-right"></i> Logout
              </a>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'accounts:login' %}">
                <i class="bi bi-box-arrow-in-right"></i> Login
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'accounts:register' %}">
                <i class="bi bi-person-plus"></i> Register
              </a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
