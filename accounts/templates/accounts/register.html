{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - CyberProp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card bg-dark border-info shadow-lg mt-5">
      <div class="card-body p-4">
        <h2 class="text-center text-info mb-4">
          <i class="bi bi-person-plus"></i> Create Account
        </h2>

        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-outline-info w-100 mt-3">
            <i class="bi bi-check-circle"></i> Register
          </button>
        </form>

        <p class="text-center mt-3 text-secondary">
          Already registered? <a href="{% url 'accounts:login' %}" class="text-info">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
